pre-commit:
  parallel: false
  commands:
    update-lockfiles:
      run: uv lock
      stage_fixed: true
    format:
      glob: "*.py"
      run: uv run black {staged_files}
      stage_fixed: true
    lint:
      glob: "*.py"
      run: uv run flake8 {staged_files}
    isort:
      glob: "*.py"
      run: uv run isort {staged_files}
      stage_fixed: true
    security:
      run: make security
      stage_fixed: true
    actionlint:
      glob: ".github/workflows/*.y*ml"
      run: actionlint {staged_files}

pre-push:
  parallel: false
  commands:
    # Identical gate to `make ai-checks` so nothing is pushed unverified.
    # Covers format, lint (incl. validate-site), security (incl. detect-secrets),
    # complexity, and tests. actionlint is the only piece ai-checks omits.
    ai-checks:
      run: make ai-checks
    actionlint:
      run: actionlint
